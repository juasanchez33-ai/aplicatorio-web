{% extends "layout.html" %}

{% block content %}
<div class="p-8 space-y-8">
    <!-- Header Area -->
    <div class="flex items-center justify-between">
        <div>
            <h3 class="text-xl font-black text-white uppercase tracking-wider">Market Intelligence</h3>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Noticias globales y análisis
                financiero en tiempo real</p>
        </div>
        <div class="flex gap-2">
            <button
                class="px-5 py-2.5 bg-primary/10 border border-primary/20 rounded-xl text-primary text-[10px] font-black uppercase tracking-widest">Todos</button>
            <button
                class="px-5 py-2.5 bg-white/5 border border-white/5 rounded-xl text-slate-500 text-[10px] font-black uppercase tracking-widest hover:text-white transition-all">Crypto</button>
            <button
                class="px-5 py-2.5 bg-white/5 border border-white/5 rounded-xl text-slate-500 text-[10px] font-black uppercase tracking-widest hover:text-white transition-all">Stocks</button>
        </div>
    </div>

    <!-- News Grid -->
    <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-10">
        <!-- Loading state -->
        <div class="col-span-full py-20 flex flex-col items-center justify-center opacity-50">
            <span class="w-12 h-12 border-4 border-primary/20 border-t-primary rounded-full animate-spin mb-4"></span>
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest animate-pulse">Obteniendo noticias globales...</p>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const grid = document.getElementById('news-grid');
        try {
            const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://cincodias.elpais.com/rss/cincodias/portada.xml');
            const data = await res.json();
            
            if (data.status === 'ok' && data.items.length > 0) {
                grid.innerHTML = '';
                // Limit to 6 items
                const items = data.items.slice(0, 6);
                const colors = ['primary', 'secondary', 'purple-500'];
                const bgColors = ['bg-primary', 'bg-secondary', 'bg-purple-500'];
                const textColors = ['text-black', 'text-black', 'text-white'];
                const textHover = ['group-hover:text-primary', 'group-hover:text-secondary', 'group-hover:text-purple-400'];

                items.forEach((item, index) => {
                    const cIdx = index % 3;
                    const dateStr = new Date(item.pubDate).toLocaleDateString('es-ES', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                    // Provide a default image if none available
                    const imgUrl = item.enclosure && item.enclosure.link ? item.enclosure.link : (item.thumbnail || 'https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?q=80&w=800&auto=format&fit=crop');
                    
                    const card = document.createElement('div');
                    card.className = `glass-panel overflow-hidden group hover:border-${colors[cIdx]==='purple-500' ? 'purple-500' : colors[cIdx]}/50 transition-all duration-500`;
                    card.innerHTML = `
                        <div class="h-48 bg-slate-800 relative overflow-hidden">
                            <img src="${imgUrl}" onerror="this.src='https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?q=80&w=800&auto=format&fit=crop'" class="w-full h-full object-cover opacity-60 group-hover:scale-110 group-hover:opacity-80 transition-all duration-700">
                            <div class="absolute inset-0 bg-gradient-to-t from-slate-900 to-transparent"></div>
                            <span class="absolute top-4 left-4 px-3 py-1 ${bgColors[cIdx]} ${textColors[cIdx]} text-[9px] font-black uppercase tracking-wider rounded-lg">Mercados</span>
                        </div>
                        <div class="p-8 space-y-4">
                            <p class="text-[10px] text-slate-600 font-bold uppercase tracking-widest">${dateStr} • Cinco Días</p>
                            <h4 class="text-[13px] font-black text-white uppercase tracking-tight leading-tight ${textHover[cIdx]} transition-colors h-16 overflow-hidden">${item.title}</h4>
                            <a href="${item.link}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 text-[10px] font-black text-${colors[cIdx] === 'purple-500' ? 'purple-400' : colors[cIdx]} uppercase tracking-widest group/link mt-2">
                                Leer historia completa
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="group-hover/link:translate-x-1 transition-transform">
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                    <polyline points="12 5 19 12 12 19"></polyline>
                                </svg>
                            </a>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } else {
                throw new Error("Sin datos de noticias");
            }
        } catch (error) {
            grid.innerHTML = '<div class="col-span-full py-10 text-center"><p class="text-red-500/80 font-bold uppercase tracking-widest text-[10px]">No se pudieron cargar las noticias temporales.</p></div>';
        }
    });
</script>
{% endblock %}
