{% extends "layout.html" %}

{% block content %}
<div class="p-8 space-y-8">
    <!-- Header Area -->
    <div class="flex items-center justify-between">
        <div>
            <h3 class="text-xl font-black text-white uppercase tracking-wider">Gestión de Pagos</h3>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Historial de abonos
                realizados a tus deudas</p>
        </div>
        <button onclick="openNewPaymentModal()" class="btn-neon flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Registrar Pago
        </button>
    </div>

    <!-- Table Section -->
    <div class="glass-panel overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-white/[0.02] border-b border-white/5">
                        <th class="px-10 py-6 text-[10px] text-slate-500 uppercase font-black tracking-widest">#</th>
                        <th class="px-10 py-6 text-[10px] text-slate-500 uppercase font-black tracking-widest">Deuda
                        </th>
                        <th
                            class="px-10 py-6 text-[10px] text-slate-500 uppercase font-black tracking-widest text-center">
                            Monto Pagado</th>
                        <th
                            class="px-10 py-6 text-[10px] text-slate-500 uppercase font-black tracking-widest text-center">
                            Fecha</th>
                        <th class="px-10 py-6 text-[10px] text-slate-500 uppercase font-black tracking-widest">Concepto
                        </th>
                        <th
                            class="px-10 py-6 text-[10px] text-slate-500 uppercase font-black tracking-widest text-right">
                            Acciones</th>
                    </tr>
                </thead>
                <tbody id="payments-table-body">
                    <!-- Loading State -->
                    <tr>
                        <td colspan="6" class="px-10 py-24 text-center">
                            <div class="flex flex-col items-center gap-4 opacity-50">
                                <span
                                    class="w-10 h-10 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></span>
                                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Cargando
                                    pagos...</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal -->
<div id="payment-modal"
    class="fixed inset-0 z-[100] hidden items-center justify-center p-6 bg-black/60 backdrop-blur-md opacity-0 transition-opacity duration-300">
    <div class="glass-panel w-full max-w-[550px] p-12 translate-y-10 transition-transform duration-300">
        <div class="flex items-center justify-between mb-10">
            <div>
                <h3 class="text-xl font-black text-white uppercase tracking-wider">Registrar Pago</h3>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Abona a una de tus deudas
                    registradas</p>
            </div>
            <button onclick="closeNewPaymentModal()"
                class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/5 border border-white/10 text-slate-500 hover:text-white transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>

        <form id="payment-form" class="space-y-8">
            <div class="space-y-3">
                <label class="text-[10px] text-slate-500 font-bold uppercase tracking-widest ml-2">Seleccionar
                    Deuda</label>
                <select id="p-debt" required onchange="showDebtDetails()"
                    class="w-full bg-slate-900 border border-white/10 rounded-2xl py-4 px-6 text-sm font-medium text-white focus:outline-none focus:border-primary/50 transition-all cursor-pointer">
                    <option value="" disabled selected>Selecciona una deuda</option>
                </select>
                <div id="p-debt-details" class="hidden text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-2 px-2 flex justify-between">
                    <span id="p-debt-balance">Restante: $0.00</span>
                    <span id="p-debt-due">Límite: --</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-8">
                <div class="space-y-3">
                    <label class="text-[10px] text-slate-500 font-bold uppercase tracking-widest ml-2">Monto a
                        pagar</label>
                    <div class="relative">
                        <input type="number" id="p-amount" step="0.01" placeholder="0.00" required
                            class="w-full bg-slate-900 border border-white/10 rounded-2xl py-4 px-6 text-sm font-medium text-white focus:outline-none focus:border-primary/50 transition-all">
                        <span class="absolute right-6 top-1/2 -translate-y-1/2 text-slate-600 font-bold">USD</span>
                    </div>
                </div>
                <div class="space-y-3">
                    <label class="text-[10px] text-slate-500 font-bold uppercase tracking-widest ml-2">Fecha del
                        pago</label>
                    <input type="date" id="p-date" required
                        class="w-full bg-slate-900 border border-white/10 rounded-2xl py-4 px-6 text-sm font-medium text-white focus:outline-none focus:border-primary/50 transition-all">
                </div>
            </div>

            <div class="space-y-3">
                <label class="text-[10px] text-slate-500 font-bold uppercase tracking-widest ml-2">Concepto
                    (Opcional)</label>
                <input type="text" id="p-concept" placeholder="Ej. Abono extra mes de marzo"
                    class="w-full bg-slate-900 border border-white/10 rounded-2xl py-4 px-6 text-sm font-medium text-white focus:outline-none focus:border-primary/50 transition-all">
            </div>

            <button type="submit" class="w-full btn-neon py-5 text-center mt-4 uppercase tracking-[0.2em]">
                Registrar Pago
            </button>
        </form>
    </div>
</div>

<script>
    function openNewPaymentModal() {
        const modal = document.getElementById('payment-modal');
        const content = modal.querySelector('.glass-panel');
        document.getElementById('p-date').valueAsDate = new Date();
        
        populateDebtsDropdown();
        document.getElementById('p-debt-details').classList.add('hidden');
        document.getElementById('p-amount').value = '';
        
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        setTimeout(() => {
            modal.classList.remove('opacity-0');
            content.classList.remove('translate-y-10');
        }, 10);
    }
    
    function populateDebtsDropdown() {
        const sel = document.getElementById('p-debt');
        sel.innerHTML = '<option value="" disabled selected>Selecciona una deuda</option>';
        if (window.cachedDebts) {
            window.cachedDebts.forEach(debt => {
                const remaining = debt.total_amount - (debt.paid_amount || 0);
                if (remaining > 0) {
                    const opt = document.createElement('option');
                    opt.value = debt.id;
                    opt.textContent = debt.name;
                    opt.dataset.remaining = remaining;
                    opt.dataset.due = debt.due_date;
                    sel.appendChild(opt);
                }
            });
        }
    }
    
    function showDebtDetails() {
        const sel = document.getElementById('p-debt');
        const opt = sel.options[sel.selectedIndex];
        const details = document.getElementById('p-debt-details');
        
        if (opt && opt.value) {
            document.getElementById('p-debt-balance').textContent = 'Restante: ' + window.formatAmount(parseFloat(opt.dataset.remaining));
            document.getElementById('p-debt-due').textContent = 'Límite: ' + opt.dataset.due;
            details.classList.remove('hidden');
        } else {
            details.classList.add('hidden');
        }
    }

    function closeNewPaymentModal() {
        const modal = document.getElementById('payment-modal');
        const content = modal.querySelector('.glass-panel');
        modal.classList.add('opacity-0');
        content.classList.add('translate-y-10');
        setTimeout(() => {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }, 300);
    }

    function updatePaymentsUI(payments) {
        const body = document.getElementById('payments-table-body');
        if (!body) return;

        if (!payments || payments.length === 0) {
            body.innerHTML = `<tr><td colspan="6" class="px-10 py-24 text-center text-slate-500 italic">No hay pagos registrados</td></tr>`;
            return;
        }

        body.innerHTML = '';
        payments.forEach((payment, index) => {
            const row = document.createElement('tr');
            row.className = 'border-b border-white/[0.03] hover:bg-white/[0.01] transition-all group';
            row.innerHTML = `
                <td class="px-10 py-6 text-slate-600 font-bold text-[10px]">${index + 1}</td>
                <td class="px-10 py-6 text-white font-bold text-sm tracking-tight">${payment.debt_name || 'Deuda'}</td>
                <td class="px-10 py-6 text-center text-primary font-black text-sm">${window.formatAmount(payment.amount)}</td>
                <td class="px-10 py-6 text-center text-slate-500 font-mono text-xs">${payment.date}</td>
                <td class="px-10 py-6 text-slate-300 text-xs">${payment.concept || ''}</td>
                <td class="px-10 py-6 text-right">
                    <div class="flex items-center justify-end gap-3 text-[10px] font-black uppercase tracking-widest text-slate-500">
                        <button class="hover:text-primary transition-colors">Detalles</button>
                        <span class="text-white/5">|</span>
                        <button class="hover:text-white transition-colors">Editar</button>
                    </div>
                </td>
            `;
            body.appendChild(row);
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        if (window.cachedPayments) updatePaymentsUI(window.cachedPayments);

        document.getElementById('payment-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerText = 'Procesando...';

            const sel = document.getElementById('p-debt');
            const debtId = sel.value;
            const debtName = sel.options[sel.selectedIndex].text;
            const amount = parseFloat(document.getElementById('p-amount').value);
            const date = document.getElementById('p-date').value;
            const concept = document.getElementById('p-concept').value;
            
            const remaining = parseFloat(sel.options[sel.selectedIndex].dataset.remaining);
            if(amount > remaining) {
                alert("El monto ingresado es mayor a la deuda pendiente.");
                btn.disabled = false;
                btn.innerText = 'Registrar Pago';
                return;
            }

            const paymentData = {
                service: debtName,
                amount: amount,
                date: date,
                status: 'Completado',
                concept: concept
            };
            
            const expenseData = {
                type: 'expense',
                concept: (concept ? concept + ' - ' : '') + 'Abono a Deuda: ' + debtName,
                amount: amount,
                date: date,
                category: 'Pago de Deudas'
            };

            try {
                // 1. Descontar en la tabla "Debts" (Firestore)
                const resDebt = await window.firebasePayDebt(debtId, amount);
                if (resDebt.status !== 'success') throw new Error(resDebt.message);
                
                // 2. Registrar el histórico en la vista "Payments"
                await window.firebaseAddData('pago', paymentData);
                
                // 3. Registrar "Movimiento de Gasto" para restar el dinero general del Dashboard
                await window.firebaseAddData('movements', expenseData);

                closeNewPaymentModal();
                if(window.loadPayments) window.loadPayments(window.currentUser.email);
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = 'Registrar Pago';
            }
        });
    });
</script>
{% endblock %}
