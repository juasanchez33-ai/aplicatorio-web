<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicativo Web para el Manejo de Finanzas Personales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-color: #030712;
            min-height: 100vh;
        }
    </style>
</head>

<body class="nebula-gradient">
    <div class="w-full max-w-[550px] z-10">
        <div class="flex flex-col items-center mb-12">
            <h1 class="text-2xl font-black text-white tracking-widest uppercase text-center">
                APLICATIVO WEB PARA EL MANEJO DE <span class="text-primary">FINANZAS PERSONALES</span>
            </h1>
        </div>

        <div class="glass-panel p-12 border-primary/40 shadow-[0_0_80px_rgba(0,240,255,0.15)]">
            <div class="text-center mb-10">
                <h3 class="text-xl font-black text-white uppercase tracking-wider mb-3">Recuperar Contraseña</h3>
                <p class="text-[11px] text-slate-500 font-bold max-w-[320px] mx-auto leading-relaxed">
                    Ingresa tu correo electrónico para recuperar el acceso a tu cuenta.
                </p>
            </div>

            <form id="recover-form" class="space-y-8">
                <!-- Recover Error -->
                <div id="recover-error" class="hidden bg-red-500/10 border border-red-500/20 rounded-xl p-4 text-center">
                    <p id="recover-error-text" class="text-[10px] text-red-500 font-black uppercase tracking-widest">Error</p>
                </div>

                <div class="relative group">
                    <input type="email" id="email" placeholder="usuario@correo.com" required
                        class="w-full bg-slate-900/40 border border-white/10 rounded-xl py-4 px-12 text-sm focus:outline-none focus:border-primary/50 transition-all font-medium text-white placeholder-slate-700">
                    <svg class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-600 group-focus-within:text-primary transition-colors"
                        xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full btn-outline-neon py-4 text-center">
                        Enviar enlace
                    </button>
                </div>
            </form>

            <div class="mt-10 text-center">
                <a href="/login"
                    class="text-[11px] text-slate-500 font-bold hover:text-primary transition-colors flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Volver al inicio de sesión
                </a>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, sendPasswordResetEmail } from '/static/js/firebase-init.js';

        const recoverForm = document.getElementById('recover-form');

        recoverForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const errorDiv = document.getElementById('recover-error');
            const errorText = document.getElementById('recover-error-text');
            const btn = recoverForm.querySelector('button[type="submit"]');
            const originalText = btn.innerText;

            errorDiv.classList.add('hidden');
            btn.innerText = 'Enviando enlace...';
            btn.disabled = true;

            try {
                await sendPasswordResetEmail(auth, email);
                window.location.href = '/confirmation';
            } catch (err) {
                errorText.innerText = 'Error: No se pudo procesar la solicitud.';
                if (err.code === 'auth/user-not-found') {
                    errorText.innerText = 'No hay una cuenta con este correo.';
                } else if (err.code === 'auth/invalid-email') {
                    errorText.innerText = 'El formato del correo es inválido.';
                }
                errorDiv.classList.remove('hidden');
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
