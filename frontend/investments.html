{% extends "layout.html" %}

{% block content %}
<div class="p-12 space-y-12">
    <!-- Header Area -->
    <div class="flex items-center justify-between">
        <div>
            <h3 class="text-xl font-black text-white uppercase tracking-wider">Inversiones</h3>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Monitoreo de tus activos y
                rendimientos</p>
        </div>
        <button onclick="openNewInvestmentModal()" class="btn-neon flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Nueva Inversión
        </button>
    </div>

    <!-- Stats Grid -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
        <div class="glass-panel p-8 border-l-4 border-l-primary">
            <p class="text-[9px] text-slate-500 font-black uppercase tracking-widest mb-2">Total Invertido</p>
            <h4 class="text-3xl font-black text-white" id="total-invested">$0.00</h4>
        </div>
        <div class="glass-panel p-8 border-l-4 border-l-secondary">
            <p class="text-[9px] text-slate-500 font-black uppercase tracking-widest mb-2">Valor Actual</p>
            <h4 class="text-3xl font-black text-white" id="current-value">$0.00</h4>
        </div>
        <div class="glass-panel p-8 border-l-4 border-l-purple-500">
            <p class="text-[9px] text-slate-500 font-black uppercase tracking-widest mb-2">Rendimiento Total</p>
            <h4 class="text-3xl font-black text-secondary" id="total-pnl">+0.00%</h4>
        </div>
    </div>

    <!-- Table Section -->
    <div class="glass-panel overflow-hidden">
        <div class="p-8 border-b border-white/5">
            <h3 class="text-xs font-black text-white uppercase tracking-[0.3em]">Desglose de Activos</h3>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-white/[0.02] border-b border-white/5">
                        <th class="px-10 py-6 text-[10px] text-slate-500 uppercase font-black tracking-widest">Activo
                        </th>
                        <th
                            class="px-10 py-6 text-[10px] text-slate-500 uppercase font-black tracking-widest text-center">
                            Invertido</th>
                        <th
                            class="px-10 py-6 text-[10px] text-slate-500 uppercase font-black tracking-widest text-center">
                            Valor Actual</th>
                        <th
                            class="px-10 py-6 text-[10px] text-slate-500 uppercase font-black tracking-widest text-right">
                            PnL</th>
                    </tr>
                </thead>
                <tbody id="investments-table-body">
                    <!-- Loading State -->
                    <tr>
                        <td colspan="4" class="px-10 py-24 text-center">
                            <div class="flex flex-col items-center gap-4 opacity-50">
                                <span
                                    class="w-10 h-10 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></span>
                                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Sincronizando
                                    activos...</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function updateInvestmentsUI(investments, searchTerm = '') {
        const body = document.getElementById('investments-table-body');
        if (!body) return;

        let filtered = investments || [];
        if (searchTerm) {
            filtered = filtered.filter(item =>
                (item.symbol || '').toLowerCase().includes(searchTerm) ||
                (item.name || '').toLowerCase().includes(searchTerm)
            );
        }

        if (filtered.length === 0) {
            body.innerHTML = `<tr><td colspan="4" class="px-10 py-24 text-center text-slate-500 italic">No hay inversiones que coincidan</td></tr>`;
            // We keep the stats reflecting the total portfolio or filtered? Mockup usually shows total.
            // But filtering stats can be useful too. Let's filter the stats for consistency with dashboard.
            document.getElementById('total-invested').textContent = `$0.00`;
            document.getElementById('current-value').textContent = `$0.00`;
            document.getElementById('total-pnl').textContent = `+0.00%`;
            return;
        }

        body.innerHTML = '';
        let totalInv = 0;
        let totalCur = 0;

        filtered.forEach(item => {
            const inv = item.investment || item.amount || 0;
            const cur = item.current || inv;
            const pnl = inv > 0 ? ((cur - inv) / inv * 100).toFixed(2) : 0;
            totalInv += inv;
            totalCur += cur;

            const pnlColor = pnl >= 0 ? 'text-secondary' : 'text-red-500';
            const row = document.createElement('tr');
            row.className = 'border-b border-white/[0.03] hover:bg-white/[0.01] transition-all group';
            row.innerHTML = `
                <td class="px-10 py-6">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-primary font-black text-xs group-hover:border-primary/50 transition-all">
                            ${(item.symbol || 'A')[0]}
                        </div>
                        <div>
                            <p class="text-white font-bold text-sm tracking-tight">${item.symbol || 'Activo'}</p>
                            <p class="text-[10px] text-slate-500 font-medium uppercase">${item.name || ''}</p>
                        </div>
                    </div>
                </td>
                <td class="px-10 py-6 text-center text-slate-400 font-mono text-xs">${window.formatAmount(inv)}</td>
                <td class="px-10 py-6 text-center text-white font-black text-sm">${window.formatAmount(cur)}</td>
                <td class="px-10 py-6 text-right font-black text-sm ${pnlColor}">${pnl >= 0 ? '+' : ''}${pnl}%</td>
            `;
            body.appendChild(row);
        });

        document.getElementById('total-invested').textContent = window.formatAmount(totalInv);
        document.getElementById('current-value').textContent = window.formatAmount(totalCur);
        const totalPnlVal = totalInv > 0 ? ((totalCur - totalInv) / totalInv * 100).toFixed(2) : '0.00';
        document.getElementById('total-pnl').textContent = `${totalPnlVal >= 0 ? '+' : ''}${totalPnlVal}%`;
    }

    document.addEventListener('DOMContentLoaded', () => {
        if (window.cachedInvestments) updateInvestmentsUI(window.cachedInvestments);

        // ... form logic if needed
    });
</script>
{% endblock %}
